<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afferium</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Source+Serif+Pro:ital,wght@400;600&display=swap');
        
        :root {
            --bg: #F6F1E6;
            --text: #111111;
            --accent: #9C2A2A;
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Source Serif Pro', serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.7;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        header {
            padding: 2rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
        }
        
        .logo {
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: -2px;
            text-transform: lowercase;
        }
        
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4rem 2rem;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .hero h1 {
            font-size: 4.8rem;
            margin: 0 0 1.5rem;
            font-weight: 600;
            letter-spacing: -4px;
            text-transform: lowercase;
        }
        
        .tagline {
            font-size: 1.5rem;
            margin-bottom: 3rem;
            opacity: 0.9;
        }
        
        .description {
            font-size: 1.25rem;
            max-width: 520px;
            margin: 0 auto 3rem;
        }
        
        .cta {
            display: inline-block;
            padding: 1.1rem 3rem;
            background-color: var(--text);
            color: var(--bg);
            text-decoration: none;
            font-weight: 600;
            border-radius: 4px;
        }
        
        footer {
            padding: 2rem 4rem;
            text-align: center;
            font-size: 0.95rem;
            opacity: 0.7;
            border-top: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">afferium</div>
    </header>
    
    <main>
        <div class="hero">
            <h1>afferium</h1>
            <p class="tagline">Creating in endless space, rather than time.</p>
            <p class="description">
                An arts and entertainment company representing artists who use computer systems to redefine authenticity.
            </p>
            <a href="mailto:hello@afferium.com" class="cta">Get in touch</a>
        </div>
    </main>
    
    <footer>
        &copy; Afferium • Sensorium project
    </footer>
</body>
</html>
