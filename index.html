<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afferium</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Source+Serif+Pro:ital,wght@400;600&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: #0a0a0f;
            color: #e0d4b8;
            font-family: 'Source Serif Pro', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }
        
        .hero {
            max-width: 480px;
            width: 100%;
            padding: 1rem;
        }
        
        video {
            width: 100%;
            max-width: 420px;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(163, 139, 255, 0.5);
            margin-bottom: 2.2rem;
        }
        
        .slogan {
            font-size: 1.5rem;
            margin-bottom: 2.8rem;
            opacity: 0.88;
            letter-spacing: 1px;
        }
        
        .nexus {
            display: inline-block;
            font-size: 2.1rem;
            letter-spacing: 6px;
            color: #c38aff;
            text-decoration: none;
            padding: 0.8rem 2.4rem;
            border: 1px solid #c38aff;
            border-radius: 6px;
            transition: all 0.5s ease;
        }
        
        .nexus:hover {
            background: #c38aff;
            color: #111;
            box-shadow: 0 0 35px #c38aff;
        }
    </style>
</head>
<body>
    <div class="hero">
        <video autoplay loop muted playsinline>
            <source src="grok-5d4e15bc-24c8-491e-ad77-e6c3558955d3-720p.mp4" type="video/mp4">
        </video>
        <p class="slogan">Creating in endless space, rather than time.</p>
        <a href="mailto:Afferium@gmail.com" class="nexus">Enter the Nexus</a>
    </div>
</body>
</html>
