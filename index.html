<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afferium</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Source+Serif+Pro:ital,wght@400;600&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Source Serif Pro', serif;
            background: #0a0a0f;
            color: #e0d4b8;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .background {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1428 0%, #0a0a0f 70%);
            z-index: -1;
        }
        
        .glow {
            position: absolute;
            width: 140%;
            height: 140%;
            background: linear-gradient(90deg, #4a9fff, #c38aff, #ffcc4a);
            filter: blur(100px);
            opacity: 0.12;
            animation: slowdrift 40s linear infinite;
        }
        
        @keyframes slowdrift {
            0% { transform: translate(-30%, -20%) rotate(0deg); }
            100% { transform: translate(30%, 30%) rotate(360deg); }
        }
        
        header {
            padding: 2.5rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }
        
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        
        .hero {
            max-width: 780px;
        }
        
        .logo-img {
            max-width: 520px;
            margin-bottom: 2rem;
            filter: drop-shadow(0 0 40px #a78bff);
        }
        
        .tagline {
            font-size: 1.65rem;
            margin-bottom: 3.5rem;
            opacity: 0.9;
            font-style: italic;
            letter-spacing: 1px;
        }
        
        .cta {
            padding: 1.2rem 3.2rem;
            background: transparent;
            border: 2px solid #c38aff;
            color: #e0d4b8;
            text-decoration: none;
            font-size: 1.15rem;
            border-radius: 6px;
            transition: all 0.4s ease;
        }
        
        .cta:hover {
            background: #c38aff;
            color: #111;
            box-shadow: 0 0 35px #c38aff;
        }
        
        footer {
            padding: 2rem;
            text-align: center;
            font-size: 0.95rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="background">
        <div class="glow"></div>
    </div>
    
    <header>
        <div style="font-size: 2.2rem; letter-spacing: -2px; opacity: 0.8;">afferium</div>
    </header>
    
    <main>
        <div class="hero">
            <img src="logo.png" alt="Afferium" class="logo-img">
            <p class="tagline">Creating in endless space, rather than time.</p>
            <a href="mailto:Afferium@gmail.com" class="cta">Step inside the receiving center</a>
        </div>
    </main>
    
    <footer>
        The place where signal becomes sovereignty • The Sensorium project
    </footer>
</body>
</html>
