<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afferium</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Source+Serif+Pro:ital,wght@400;600&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Source Serif Pro', serif;
            background: #0a0a0f;
            color: #e0d4b8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .background {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1428 0%, #0a0a0f 70%);
            z-index: -1;
        }
        
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            position: relative;
        }
        
        .hero {
            max-width: 680px;
        }
        
        .logo-video {
            max-width: 520px;
            margin-bottom: 2rem;
            border-radius: 8px;
            box-shadow: 0 0 60px rgba(163, 139, 255, 0.5);
        }
        
        .slogan {
            font-size: 1.65rem;
            margin-bottom: 3rem;
            opacity: 0.9;
            letter-spacing: 1px;
        }
        
        .nexus {
            font-size: 2.4rem;
            letter-spacing: 4px;
            color: #c38aff;
            text-decoration: none;
            transition: all 0.4s ease;
        }
        
        .nexus:hover {
            color: #ffffff;
            text-shadow: 0 0 25px #c38aff;
        }
    </style>
</head>
<body>
    <div class="background"></div>
    
    <main>
        <div class="hero">
            <video class="logo-video" autoplay loop muted playsinline>
                <source src="grok-5d4e15bc-24c8-491e-ad77-e6c3558955d3-720p.mp4" type="video/mp4">
            </video>
            <p class="slogan">Creating in endless space, rather than time.</p>
            <a href="mailto:Afferium@gmail.com" class="nexus">THE NEXUS</a>
        </div>
    </main>
</body>
</html>
