<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afferium</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Source+Serif+Pro:ital,wght@400;600&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: #0a0a0f;
            color: #e0d4b8;
            font-family: 'Source Serif Pro', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem 1rem;
        }
        
        img {
            max-width: 100%;
            height: auto;
            max-height: 340px;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(163, 139, 255, 0.4);
            margin-bottom: 2rem;
        }
        
        .slogan {
            font-size: 1.45rem;
            margin-bottom: 2.5rem;
            opacity: 0.9;
            max-width: 380px;
        }
        
        .nexus {
            font-size: 2rem;
            letter-spacing: 5px;
            color: #c38aff;
            text-decoration: none;
            padding: 0.9rem 2.4rem;
            border: 1px solid #c38aff;
            border-radius: 6px;
            transition: all 0.4s ease;
        }
        
        .nexus:hover {
            background: #c38aff;
            color: #111;
        }
    </style>
</head>
<body>
    <img src="grok-1fd5b62f-bb81-4c15-a312-7af21af6df55.jpg" alt="Afferium">
    <p class="slogan">Creating in endless space, rather than time.</p>
    <a href="mailto:Afferium@gmail.com" class="nexus">Enter the Nexus</a>
</body>
</html>
