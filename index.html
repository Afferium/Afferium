<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afferium</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Source+Serif+Pro:ital,wght@400;600&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Source Serif Pro', serif;
            background: #0a0a0f;
            color: #e0d4b8;
            overflow-x: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .background {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1428 0%, #0a0a0f 70%);
            z-index: -1;
            overflow: hidden;
        }
        
        .glow {
            position: absolute;
            width: 120%;
            height: 120%;
            background: linear-gradient(45deg, #4a9fff, #9f4aff, #ffcc4a);
            filter: blur(80px);
            opacity: 0.15;
            animation: drift 25s linear infinite;
        }
        
        @keyframes drift {
            0% { transform: translate(-20%, -20%) rotate(0deg); }
            100% { transform: translate(20%, 20%) rotate(360deg); }
        }
        
        header {
            padding: 2rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }
        
        .logo {
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: -3px;
            background: linear-gradient(90deg, #6eb3ff, #c38aff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(110, 179, 255, 0.6);
        }
        
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 2rem;
            position: relative;
        }
        
        .hero {
            max-width: 720px;
        }
        
        .hero h1 {
            font-size: 5rem;
            margin: 0 0 1.5rem;
            letter-spacing: -6px;
            line-height: 1;
        }
        
        .tagline {
            font-size: 1.6rem;
            margin-bottom: 3rem;
            opacity: 0.9;
            font-style: italic;
        }
        
        .cta {
            padding: 1rem 3rem;
            background: transparent;
            border: 2px solid #c38aff;
            color: #e0d4b8;
            text-decoration: none;
            font-size: 1.1rem;
            border-radius: 4px;
            transition: all 0.4s ease;
        }
        
        .cta:hover {
            background: #c38aff;
            color: #0a0a0f;
            box-shadow: 0 0 25px #c38aff;
        }
        
        footer {
            padding: 2rem;
            text-align: center;
            font-size: 0.9rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="background">
        <div class="glow"></div>
    </div>
    
    <header>
        <div class="logo">afferium</div>
    </header>
    
    <main>
        <div class="hero">
            <h1>AFFERIUM</h1>
            <p class="tagline">Creating in endless space, rather than time.</p>
            <a href="mailto:hello@afferium.com" class="cta">Enter the receiving center</a>
        </div>
    </main>
    
    <footer>
        The place where signal becomes sovereignty • Sensorium project
    </footer>
</body>
</html>
